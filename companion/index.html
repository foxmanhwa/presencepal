<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d0d0f" />
  <title>PresencePal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0f;
      --bg2:      #161618;
      --bg3:      #1e1e21;
      --border:   #2a2a2e;
      --text:     #e8e9ea;
      --muted:    #6b6c70;
      --accent:   #00c2ff;
      --accent-h: #00a8dd;
      --green:    #00e676;
      --red:      #ff4458;
      --yellow:   #f0b429;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    /* ── Pages ──────────────────────────────────────── */
    .page { display: none; flex-direction: column; height: 100vh; }
    .page.active { display: flex; }

    /* ── Connect page ───────────────────────────────── */
    #connect-page {
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 0;
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .logo span { color: var(--accent); }

    .tagline {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 40px;
      text-align: center;
    }

    .connect-card {
      width: 100%;
      max-width: 360px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }

    .connect-card label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .connect-card input {
      flex: 1;
      padding: 12px 14px;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    .connect-card input:focus { border-color: var(--accent); }
    .connect-card input::placeholder { color: var(--muted); }

    .btn-connect {
      padding: 12px 18px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-connect:active { background: var(--accent-h); }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .hint code {
      background: var(--bg3);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }

    #connect-error {
      margin-top: 10px;
      font-size: 13px;
      color: var(--red);
      display: none;
    }

    /* ── Main page ──────────────────────────────────── */
    #main-page { position: relative; }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .app-header .logo { font-size: 18px; margin-bottom: 0; }

    #now-playing {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
    }
    #now-playing.show { display: flex; }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
      animation: dot-live 1.6s ease-in-out infinite;
    }
    @keyframes dot-live {
      0%, 100% { box-shadow: 0 0 4px var(--green); }
      50%       { box-shadow: 0 0 12px var(--green), 0 0 20px rgba(0,230,118,0.4); }
    }
    #np-name {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-settings {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-settings:active { color: var(--text); }

    /* Search */
    .search-bar {
      padding: 10px 14px 8px;
      flex-shrink: 0;
      background: var(--bg);
    }
    .search-bar input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--muted); }

    /* Game grid */
    #game-grid {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 120px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }
    #game-grid::-webkit-scrollbar { display: none; }

    .game-card {
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 8px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      user-select: none;
    }
    .game-card:active { background: var(--bg3); border-color: var(--accent); }
    .game-card.active-game {
      border-color: var(--green);
      background: rgba(0,230,118,0.06);
    }

    .card-icon {
      width: 52px; height: 52px;
      border-radius: 10px;
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .card-icon img {
      width: 52px; height: 52px;
      object-fit: cover;
      display: block;
    }
    .card-initial {
      font-size: 22px;
      font-weight: 800;
      color: var(--muted);
    }

    .card-name {
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
      color: var(--text);
      word-break: break-word;
    }

    /* No results */
    #no-results {
      display: none;
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 14px;
    }

    /* Stop bar */
    #stop-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 50;
    }
    #stop-bar.show { display: flex; }

    #stop-label {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    #stop-label strong { color: var(--green); }

    #btn-stop {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1.5px solid var(--red);
      color: var(--red);
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    #btn-stop:active { background: rgba(255,68,88,0.12); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: var(--green); color: var(--green); background: #0d1f14; }
    #toast.error   { border-color: var(--red);   color: var(--red);   background: #1f0d10; }

    /* Loading overlay */
    #loading-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      z-index: 300;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<!-- Connect page -->
<div id="connect-page" class="page active">
  <div class="logo">Presence<span>Pal</span></div>
  <div class="tagline">Control your Discord activity from your phone</div>

  <div class="connect-card">
    <label>PC IP Address</label>
    <div class="input-row">
      <input id="ip-input" type="text" inputmode="decimal" placeholder="192.168.1.x" autocomplete="off" />
      <button class="btn-connect" id="btn-connect">Connect</button>
    </div>
    <div class="hint">
      Find your PC IP: open Command Prompt and run <code>ipconfig</code>,
      look for <code>IPv4 Address</code> under your Wi-Fi adapter.
    </div>
    <div id="connect-error"></div>
  </div>
</div>

<!-- Main page -->
<div id="main-page" class="page">
  <div class="app-header">
    <div class="logo">Presence<span>Pal</span></div>
    <div id="now-playing">
      <div class="live-dot"></div>
      <span id="np-name">Game</span>
    </div>
    <button class="btn-settings" id="btn-settings" title="Change PC IP">&#9881;</button>
  </div>

  <div class="search-bar">
    <input id="search" type="search" placeholder="Search games..." autocomplete="off" />
  </div>

  <div id="game-grid">
    <div id="no-results">No games found</div>
  </div>

  <div id="stop-bar">
    <div id="stop-label">Now playing: <strong id="stop-game-name">—</strong></div>
    <button id="btn-stop">Stop Activity</button>
  </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay" class="hidden">
  <div class="spinner"></div>
  <div class="loading-text">Launching...</div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── Games list ───────────────────────────────────────
  const GAMES = [
    // Mobile
    { name: 'Clash Royale',         icon: null },
    { name: 'Clash of Clans',       icon: null },
    { name: 'Brawl Stars',          icon: null },
    { name: 'PUBG Mobile',          icon: null },
    { name: 'Free Fire',            icon: null },
    { name: 'Mobile Legends',       icon: null },
    { name: 'Arena of Valor',       icon: null },
    { name: 'Genshin Impact',       icon: null },
    { name: 'Honkai: Star Rail',    icon: null },
    { name: 'Pokemon GO',           icon: null },
    { name: 'Among Us',             icon: null },
    { name: 'Candy Crush Saga',     icon: null },
    { name: 'Subway Surfers',       icon: null },
    { name: 'Roblox',               icon: null },
    { name: 'Stumble Guys',         icon: null },
    { name: 'Wild Rift',            icon: null },
    { name: 'Call of Duty: Mobile', icon: null },
    { name: 'Minecraft',            icon: null },
    // PC
    { name: 'Valorant',             icon: null },
    { name: 'League of Legends',    icon: null },
    { name: 'Counter-Strike 2',     icon: null },
    { name: 'Fortnite',             icon: null },
    { name: 'Apex Legends',         icon: null },
    { name: 'Overwatch 2',          icon: null },
    { name: 'Dota 2',               icon: null },
    { name: 'Rust',                 icon: null },
    { name: 'Terraria',             icon: null },
    { name: 'Stardew Valley',       icon: null },
    { name: 'Elden Ring',           icon: null },
    { name: 'Cyberpunk 2077',       icon: null },
    { name: 'Hollow Knight',        icon: null },
    { name: 'Celeste',              icon: null },
    { name: 'Hades',                icon: null },
    { name: 'Path of Exile',        icon: null },
    { name: 'World of Warcraft',    icon: null },
    { name: 'Final Fantasy XIV',    icon: null },
    { name: 'Destiny 2',            icon: null },
    { name: 'Warframe',             icon: null },
    { name: 'Team Fortress 2',      icon: null },
    // Console / cross-platform
    { name: 'GTA V Online',         icon: null },
    { name: 'Call of Duty: Warzone',icon: null },
    { name: 'Rocket League',        icon: null },
    { name: 'Fall Guys',            icon: null },
    { name: 'EA FC 24',             icon: null },
    { name: 'NBA 2K24',             icon: null },
    { name: 'Diablo IV',            icon: null },
    { name: 'Sea of Thieves',       icon: null },
    { name: 'Dead by Daylight',     icon: null },
    { name: 'Phasmophobia',         icon: null },
  ];

  // ── State ────────────────────────────────────────────
  let pcIp        = localStorage.getItem('pp_ip') || '';
  let nowPlaying  = null;
  let filtered    = [...GAMES];
  let pollInterval = null;

  // ── Toast ─────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, type = 'info') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 2400);
  }

  // ── Connect page ──────────────────────────────────────
  document.getElementById('ip-input').value = pcIp;

  document.getElementById('btn-connect').addEventListener('click', tryConnect);
  document.getElementById('ip-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryConnect();
  });

  async function tryConnect() {
    const ip = document.getElementById('ip-input').value.trim();
    const errEl = document.getElementById('connect-error');
    errEl.style.display = 'none';

    if (!ip) { errEl.textContent = 'Enter your PC IP address'; errEl.style.display = 'block'; return; }

    document.getElementById('btn-connect').textContent = '...';
    document.getElementById('btn-connect').disabled = true;

    try {
      const res = await fetch(`http://${ip}:41235/status`, { signal: AbortSignal.timeout(4000) });
      const data = await res.json();
      if (!data.success) throw new Error('Unexpected response');
      pcIp = ip;
      localStorage.setItem('pp_ip', ip);
      nowPlaying = data.playing || null;
      showMain();
    } catch {
      errEl.textContent = `Could not reach ${ip}:41235 — is PresencePal running on that PC?`;
      errEl.style.display = 'block';
    }

    document.getElementById('btn-connect').textContent = 'Connect';
    document.getElementById('btn-connect').disabled = false;
  }

  // Auto-connect if IP saved
  if (pcIp) {
    tryConnect();
  }

  // ── Status polling ────────────────────────────────────
  function startPolling() {
    stopPolling();
    pollInterval = setInterval(async () => {
      try {
        const res  = await fetch(`http://${pcIp}:41235/status`, { signal: AbortSignal.timeout(3000) });
        const data = await res.json();
        if (data.success && (data.playing || null) !== nowPlaying) {
          nowPlaying = data.playing || null;
          renderNowPlaying();
        }
      } catch {}
    }, 5000);
  }

  function stopPolling() {
    clearInterval(pollInterval);
    pollInterval = null;
  }

  // ── Settings (back to connect) ────────────────────────
  document.getElementById('btn-settings').addEventListener('click', () => {
    stopPolling();
    document.getElementById('connect-page').classList.add('active');
    document.getElementById('main-page').classList.remove('active');
    document.getElementById('ip-input').value = pcIp;
    document.getElementById('connect-error').style.display = 'none';
    document.getElementById('btn-connect').textContent = 'Connect';
    document.getElementById('btn-connect').disabled = false;
  });

  // ── Main page ─────────────────────────────────────────
  function showMain() {
    document.getElementById('connect-page').classList.remove('active');
    document.getElementById('main-page').classList.add('active');
    renderNowPlaying();
    renderGrid(filtered);
    startPolling();
  }

  function renderNowPlaying() {
    const bar  = document.getElementById('now-playing');
    const name = document.getElementById('np-name');
    const stopBar  = document.getElementById('stop-bar');
    const stopName = document.getElementById('stop-game-name');

    if (nowPlaying) {
      bar.classList.add('show');
      name.textContent = nowPlaying;
      stopBar.classList.add('show');
      stopName.textContent = nowPlaying;
    } else {
      bar.classList.remove('show');
      stopBar.classList.remove('show');
    }

    // Highlight active card
    document.querySelectorAll('.game-card').forEach(el => {
      el.classList.toggle('active-game', el.dataset.name === nowPlaying);
    });
  }

  // ── Game grid ─────────────────────────────────────────
  function renderGrid(games) {
    const grid = document.getElementById('game-grid');
    const noResults = document.getElementById('no-results');

    // Remove existing cards
    grid.querySelectorAll('.game-card').forEach(el => el.remove());

    if (games.length === 0) {
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';

    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card' + (game.name === nowPlaying ? ' active-game' : '');
      card.dataset.name = game.name;

      const iconEl = document.createElement('div');
      iconEl.className = 'card-icon';
      const initial = document.createElement('span');
      initial.className = 'card-initial';
      initial.textContent = game.name[0].toUpperCase();
      iconEl.appendChild(initial);

      const nameEl = document.createElement('div');
      nameEl.className = 'card-name';
      nameEl.textContent = game.name;

      card.appendChild(iconEl);
      card.appendChild(nameEl);
      card.addEventListener('click', () => launchGame(game.name));
      grid.appendChild(card);
    });
  }

  // ── Search ────────────────────────────────────────────
  document.getElementById('search').addEventListener('input', function () {
    const q = this.value.trim().toLowerCase();
    filtered = q ? GAMES.filter(g => g.name.toLowerCase().includes(q)) : [...GAMES];
    renderGrid(filtered);
  });

  // ── Launch ────────────────────────────────────────────
  async function launchGame(name) {
    const overlay = document.getElementById('loading-overlay');
    overlay.classList.remove('hidden');
    overlay.querySelector('.loading-text').textContent = `Launching ${name}…`;

    try {
      const res = await fetch(
        `http://${pcIp}:41235/play?game=${encodeURIComponent(name)}`,
        { signal: AbortSignal.timeout(10000) }
      );
      const data = await res.json();
      if (data.success) {
        nowPlaying = data.game || name;
        renderNowPlaying();
        showToast(`Now playing ${nowPlaying}`, 'success');
      } else {
        showToast(data.error || 'Launch failed', 'error');
      }
    } catch (err) {
      showToast('Could not reach PresencePal', 'error');
    }

    overlay.classList.add('hidden');
  }

  // ── Stop ──────────────────────────────────────────────
  document.getElementById('btn-stop').addEventListener('click', async () => {
    try {
      const res  = await fetch(`http://${pcIp}:41235/stop`, { signal: AbortSignal.timeout(6000) });
      const data = await res.json();
      if (data.success) {
        nowPlaying = null;
        renderNowPlaying();
        showToast('Activity stopped', 'info');
      } else {
        showToast(data.error || 'Stop failed', 'error');
      }
    } catch {
      showToast('Could not reach PresencePal', 'error');
    }
  });
</script>
</body>
</html>
